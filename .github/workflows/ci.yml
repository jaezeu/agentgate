name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Component tests
        run: npm test

      - name: Production build
        run: npm run build

  go:
    name: Go
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: agentgate
          POSTGRES_PASSWORD: agentgate
          POSTGRES_USER: agentgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentgate -d agentgate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AGENTGATE_TEST_DATABASE_URL: postgres://agentgate:agentgate@127.0.0.1:5432/agentgate?sslmode=disable
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: 1.24.x
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          AGENTGATE_REQUIRE_DOCKER: "true"
        run: go test -race -coverprofile=coverage.out ./...

      - name: Lint
        uses: golangci/golangci-lint-action@25e2cdc5eb1d7a04fdc45ff538f1a00e960ae128 # v8.0.0
        with:
          version: v2.12.2

  policy:
    name: OPA policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          version: latest

      - name: Check formatting
        run: test -z "$(opa fmt --diff policies)"

      - name: Check policy
        run: opa check policies

      - name: Test policy
        run: opa test -v policies

  migrations:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: agentgate
          POSTGRES_PASSWORD: agentgate
          POSTGRES_USER: agentgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentgate -d agentgate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: agentgate
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Apply migrations
        run: |
          psql -h 127.0.0.1 -U agentgate -d agentgate -v ON_ERROR_STOP=1 \
            -f internal/audit/migrations/000001_foundation.up.sql \
            -f internal/audit/migrations/000002_expiring_bindings.up.sql

      - name: Verify append-only audit trigger
        run: |
          psql -h 127.0.0.1 -U agentgate -d agentgate -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO audit_events (
              event_id,
              request_id,
              event_type,
              spiffe_id,
              on_behalf_of,
              ticket_id
          ) VALUES (
              '00000000-0000-4000-8000-000000000001',
              '00000000-0000-4000-8000-000000000002',
              'grant_verified',
              'spiffe://agentgate.test/ns/agents/sa/runner',
              'ci@example.test',
              'CI-1'
          );
          DO $$
          BEGIN
              BEGIN
                  UPDATE audit_events SET ticket_id = 'changed';
                  RAISE EXCEPTION 'append-only trigger did not reject update';
              EXCEPTION
                  WHEN raise_exception THEN
                      IF SQLERRM <> 'audit_events is append-only' THEN
                          RAISE;
                      END IF;
              END;
          END;
          $$;
          SQL

      - name: Roll back migrations
        run: |
          psql -h 127.0.0.1 -U agentgate -d agentgate -v ON_ERROR_STOP=1 \
            -f internal/audit/migrations/000002_expiring_bindings.down.sql \
            -f internal/audit/migrations/000001_foundation.down.sql

  deployment:
    name: Deployment static validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6
          terraform_wrapper: false

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v4.2.0

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive deploy

      - name: Initialize and validate Terraform roots
        run: |
          for root in bootstrap infra platform agentgate; do
            terraform -chdir="deploy/${root}" init -backend=false -input=false -lockfile=readonly
            terraform -chdir="deploy/${root}" validate
          done

      - name: Render and inspect pinned charts
        run: deploy/scripts/render-charts.sh "${RUNNER_TEMP}/rendered"

      - name: Assert AgentGate deployment boundaries
        run: |
          deploy/scripts/assert-agentgate-static.sh
          terraform -chdir=deploy/bootstrap test
          terraform -chdir=deploy/agentgate test

      - name: Scan for static cloud credentials
        run: |
          if grep -RInE \
            '(AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|aws_access_key_id[[:space:]]*=[[:space:]]*"|aws_secret_access_key[[:space:]]*=[[:space:]]*")' \
            deploy \
            --exclude-dir=.terraform \
            --exclude='*.lock.hcl'; then
            echo "Static cloud credential pattern found" >&2
            exit 1
          fi

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: ./deploy/scripts