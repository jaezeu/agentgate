name: Deploy

# One-click sandbox deploy: takes a fresh AWS account from nothing to a
# running AgentGate. Run it from the Actions tab; if a stage fails, fix the
# cause and use "Re-run failed jobs" to resume from there.
#
# First run only, delete after bootstrap succeeds (Settings -> Secrets):
#   AGENTGATE_BOOTSTRAP_ACCESS_KEY_ID / AGENTGATE_BOOTSTRAP_SECRET_ACCESS_KEY
#     one IAM user key, used once to create the OIDC deployer role.
#
# Repository variables (Settings -> Variables):
#   AGENTGATE_STATE_BUCKET                  state bucket (created if missing)
#   AGENTGATE_AWS_REGION                    sandbox region
#   AGENTGATE_EKS_PUBLIC_ACCESS_CIDRS       JSON list for the infra root
#   AGENTGATE_ALLOW_PUBLIC_CLUSTER_ENDPOINT 'true' only with 0.0.0.0/0
#   AGENTGATE_OPERATOR_PRINCIPAL_ARNS       JSON list, may be '[]'
#   AGENTGATE_CLUSTER_NAME                  defaults to agentgate-sandbox-eks
# The bootstrap stage writes back AGENTGATE_DEPLOYER_ROLE_ARN.

on:
  workflow_dispatch:

permissions:
  id-token: write # assume the deployer role via OIDC
  contents: read

concurrency:
  group: deploy-sandbox
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: '1'
  TERRAFORM_VERSION: 1.15.6
  AGENTGATE_STATE_BUCKET: ${{ vars.AGENTGATE_STATE_BUCKET }}
  AGENTGATE_AWS_REGION: ${{ vars.AGENTGATE_AWS_REGION }}
  TF_VAR_state_bucket: ${{ vars.AGENTGATE_STATE_BUCKET }}
  TF_VAR_state_bucket_region: ${{ vars.AGENTGATE_AWS_REGION }}
  TF_VAR_cluster_endpoint_public_access_cidrs: ${{ vars.AGENTGATE_EKS_PUBLIC_ACCESS_CIDRS }}
  TF_VAR_allow_public_cluster_endpoint: ${{ vars.AGENTGATE_ALLOW_PUBLIC_CLUSTER_ENDPOINT || 'false' }}
  TF_VAR_operator_access_principal_arns: ${{ vars.AGENTGATE_OPERATOR_PRINCIPAL_ARNS || '[]' }}

jobs:
  bootstrap:
    name: Bootstrap deployment trust
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: write # write back AGENTGATE_DEPLOYER_ROLE_ARN
    outputs:
      deployer_role_arn: ${{ steps.role.outputs.arn }}
    steps:
      - uses: actions/checkout@v6

      # First run has no deployer role yet: a one-time IAM user key creates the
      # OIDC trust anchor. Every later run assumes the role instead.
      - name: Configure AWS (first run, IAM user key)
        if: vars.AGENTGATE_DEPLOYER_ROLE_ARN == ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AGENTGATE_BOOTSTRAP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTGATE_BOOTSTRAP_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AGENTGATE_AWS_REGION }}

      - name: Configure AWS via OIDC
        if: vars.AGENTGATE_DEPLOYER_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AGENTGATE_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ vars.AGENTGATE_AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Apply bootstrap
        env:
          TF_VAR_github_repository: ${{ github.repository }}
        run: |
          deploy/scripts/ci-ensure-state-bucket.sh
          deploy/scripts/init-root.sh bootstrap
          terraform -chdir=deploy/bootstrap apply -input=false -auto-approve

      - name: Publish the deployer role ARN
        id: role
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          arn="$(terraform -chdir=deploy/bootstrap output -raw deployer_role_arn)"
          echo "arn=${arn}" >> "${GITHUB_OUTPUT}"
          gh variable set AGENTGATE_DEPLOYER_ROLE_ARN --body "${arn}" ||
            echo "Set repository variable AGENTGATE_DEPLOYER_ROLE_ARN=${arn} manually."

  infra:
    name: Infra (VPC, EKS, demo target)
    needs: [bootstrap]
    runs-on: ubuntu-latest
    env:
      TF_VAR_deployer_role_arn: ${{ needs.bootstrap.outputs.deployer_role_arn }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ needs.bootstrap.outputs.deployer_role_arn }}
          aws-region: ${{ vars.AGENTGATE_AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Apply infra
        run: |
          deploy/scripts/init-root.sh infra
          terraform -chdir=deploy/infra apply -input=false -auto-approve

  platform:
    name: Platform (SPIRE, Vault, PostgreSQL)
    needs: [bootstrap, infra]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ needs.bootstrap.outputs.deployer_role_arn }}
          aws-region: ${{ vars.AGENTGATE_AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      # The deploy scripts assert they run against this account and cluster.
      - name: Update kubeconfig
        run: |
          echo "AGENTGATE_CLUSTER_NAME=${{ vars.AGENTGATE_CLUSTER_NAME || 'agentgate-sandbox-eks' }}" >> "${GITHUB_ENV}"
          echo "AGENTGATE_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "${GITHUB_ENV}"
          aws eks update-kubeconfig \
            --name "${{ vars.AGENTGATE_CLUSTER_NAME || 'agentgate-sandbox-eks' }}" \
            --region "${{ vars.AGENTGATE_AWS_REGION }}"

      - name: Prepare namespaces and PostgreSQL secret
        env:
          AGENTGATE_SECRET_DIR: ${{ runner.temp }}/agentgate-secrets
        run: deploy/scripts/bootstrap-platform.sh

      # A fresh cluster has no Vault yet, so apply once without Vault config.
      # Re-runs skip this (re-applying with the flag off would remove the
      # Vault configuration from state).
      - name: Platform pass 1 (before Vault exists)
        run: |
          deploy/scripts/init-root.sh platform
          if kubectl get statefulset vault --namespace vault >/dev/null 2>&1; then
            echo "Vault already deployed; skipping."
          else
            TF_VAR_vault_configuration_enabled=false \
              terraform -chdir=deploy/platform apply -input=false -auto-approve
          fi

      - name: Setup Vault CLI
        run: |
          curl -fsSLo vault.zip \
            "https://releases.hashicorp.com/vault/1.20.4/vault_1.20.4_linux_amd64.zip"
          unzip -o vault.zip vault
          sudo install -m 0755 vault /usr/local/bin/vault

      - name: Initialize Vault and configure deployment trust
        run: deploy/scripts/ci-bootstrap-vault.sh

      # Exports VAULT_* to $GITHUB_ENV, so it must precede the apply step.
      - name: Export Vault environment via OIDC
        run: deploy/scripts/ci-vault-env.sh

      - name: Platform pass 2 (with Vault config)
        env:
          TF_VAR_vault_configuration_enabled: 'true'
        run: terraform -chdir=deploy/platform apply -input=false -auto-approve

  image:
    name: Build and push application image
    needs: [bootstrap]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ needs.bootstrap.outputs.deployer_role_arn }}
          aws-region: ${{ vars.AGENTGATE_AWS_REGION }}

      - name: Build, push, and resolve the immutable digest
        id: push
        run: |
          account="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account}.dkr.ecr.${AGENTGATE_AWS_REGION}.amazonaws.com"
          repository="agentgate-sandbox/agentgate"
          aws ecr get-login-password | docker login --username AWS --password-stdin "${registry}"

          docker build \
            --file deploy/images/Dockerfile \
            --build-arg TARGETARCH=amd64 \
            --tag "${registry}/${repository}:${GITHUB_SHA}" \
            .
          docker push "${registry}/${repository}:${GITHUB_SHA}"

          digest="$(aws ecr describe-images \
            --repository-name "${repository}" \
            --image-ids imageTag="${GITHUB_SHA}" \
            --query 'imageDetails[0].imageDigest' --output text)"
          echo "image=${registry}/${repository}@${digest}" >> "${GITHUB_OUTPUT}"

  agentgate:
    name: AgentGate control plane
    needs: [bootstrap, platform, image]
    runs-on: ubuntu-latest
    env:
      TF_VAR_application_image: ${{ needs.image.outputs.image }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ needs.bootstrap.outputs.deployer_role_arn }}
          aws-region: ${{ vars.AGENTGATE_AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Apply agentgate
        run: |
          deploy/scripts/init-root.sh agentgate
          terraform -chdir=deploy/agentgate apply -input=false -auto-approve

      - name: Verify the deployed platform
        run: |
          export AGENTGATE_CLUSTER_NAME="${{ vars.AGENTGATE_CLUSTER_NAME || 'agentgate-sandbox-eks' }}"
          export AGENTGATE_AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          aws eks update-kubeconfig --name "${AGENTGATE_CLUSTER_NAME}" --region "${{ vars.AGENTGATE_AWS_REGION }}"
          deploy/scripts/verify-cluster.sh
