name: Deploy

# Sandbox deployment through GitHub OIDC. No static cloud credential exists:
# jobs assume the deployer role created by deploy/bootstrap, and the platform
# Vault pass exchanges the job's OIDC token for a short-lived Vault token.
#
# Required repository/environment variables (Settings -> Variables):
#   AGENTGATE_STATE_BUCKET            pre-existing Terraform state bucket
#   AGENTGATE_AWS_REGION              sandbox region
#   AGENTGATE_DEPLOYER_ROLE_ARN       deployer role from deploy/bootstrap
#   AGENTGATE_EKS_PUBLIC_ACCESS_CIDRS JSON list for the infra root
#   AGENTGATE_ALLOW_PUBLIC_CLUSTER_ENDPOINT  'true' only with 0.0.0.0/0
#   AGENTGATE_OPERATOR_PRINCIPAL_ARNS JSON list, may be '[]'
#   AGENTGATE_CLUSTER_NAME            defaults to agentgate-sandbox-eks
#   AGENTGATE_VAULT_CONFIGURED        'true' after bootstrap-vault.sh ran
#   AGENTGATE_APPLICATION_IMAGE       digest-pinned image for the agentgate root
#
# The 'sandbox' environment must be protected with required reviewers; the
# 'sandbox-plan' environment stays unprotected for read-only plans.

on:
  workflow_dispatch:
    inputs:
      root:
        description: Terraform root to run
        required: true
        type: choice
        options:
          - infra
          - platform
          - agentgate
      action:
        description: Terraform action
        required: true
        type: choice
        options:
          - plan
          - apply
  schedule:
    - cron: '17 2 * * 1-5'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-sandbox
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: '1'
  AGENTGATE_STATE_BUCKET: ${{ vars.AGENTGATE_STATE_BUCKET }}
  AGENTGATE_AWS_REGION: ${{ vars.AGENTGATE_AWS_REGION }}
  TF_VAR_state_bucket: ${{ vars.AGENTGATE_STATE_BUCKET }}
  TF_VAR_state_bucket_region: ${{ vars.AGENTGATE_AWS_REGION }}
  TF_VAR_deployer_role_arn: ${{ vars.AGENTGATE_DEPLOYER_ROLE_ARN }}
  TF_VAR_cluster_endpoint_public_access_cidrs: ${{ vars.AGENTGATE_EKS_PUBLIC_ACCESS_CIDRS }}
  TF_VAR_allow_public_cluster_endpoint: ${{ vars.AGENTGATE_ALLOW_PUBLIC_CLUSTER_ENDPOINT || 'false' }}
  TF_VAR_operator_access_principal_arns: ${{ vars.AGENTGATE_OPERATOR_PRINCIPAL_ARNS || '[]' }}
  TF_VAR_vault_configuration_enabled: ${{ vars.AGENTGATE_VAULT_CONFIGURED || 'false' }}
  TF_VAR_application_image: ${{ vars.AGENTGATE_APPLICATION_IMAGE }}

jobs:
  terraform:
    name: ${{ inputs.action }} ${{ inputs.root }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.action == 'apply' && 'sandbox' || 'sandbox-plan' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6
          terraform_wrapper: false

      - name: Assume the sandbox deployer role
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ vars.AGENTGATE_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ vars.AGENTGATE_AWS_REGION }}

      - name: Install pinned kubectl
        if: inputs.root == 'platform' && vars.AGENTGATE_VAULT_CONFIGURED == 'true'
        run: |
          curl -fsSLo kubectl "https://dl.k8s.io/release/v1.36.1/bin/linux/amd64/kubectl"
          echo "629d3f410e09bf49b64ae7079f7f0bda1191efed311f7d37fdbab0ad5b0ec2b7  kubectl" | sha256sum --check
          sudo install -m 0755 kubectl /usr/local/bin/kubectl

      - name: Export Vault environment through GitHub OIDC
        if: inputs.root == 'platform' && vars.AGENTGATE_VAULT_CONFIGURED == 'true'
        run: |
          aws eks update-kubeconfig \
            --name "${{ vars.AGENTGATE_CLUSTER_NAME || 'agentgate-sandbox-eks' }}" \
            --region "${{ vars.AGENTGATE_AWS_REGION }}"
          deploy/scripts/ci-vault-env.sh

      - name: Initialize root against the S3 backend
        run: deploy/scripts/init-root.sh "${{ inputs.root }}"

      - name: Validate
        run: terraform -chdir="deploy/${{ inputs.root }}" validate

      - name: Plan
        if: inputs.action == 'plan'
        run: terraform -chdir="deploy/${{ inputs.root }}" plan -input=false

      - name: Apply
        if: inputs.action == 'apply'
        run: terraform -chdir="deploy/${{ inputs.root }}" apply -input=false -auto-approve

  drift:
    name: drift ${{ matrix.root }}
    if: github.event_name == 'schedule' && vars.AGENTGATE_DEPLOYER_ROLE_ARN != ''
    runs-on: ubuntu-latest
    environment: sandbox-plan
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        root: [infra, platform, agentgate]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6
          terraform_wrapper: false

      - name: Assume the sandbox deployer role
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ vars.AGENTGATE_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ vars.AGENTGATE_AWS_REGION }}

      - name: Install pinned kubectl
        if: matrix.root == 'platform' && vars.AGENTGATE_VAULT_CONFIGURED == 'true'
        run: |
          curl -fsSLo kubectl "https://dl.k8s.io/release/v1.36.1/bin/linux/amd64/kubectl"
          echo "629d3f410e09bf49b64ae7079f7f0bda1191efed311f7d37fdbab0ad5b0ec2b7  kubectl" | sha256sum --check
          sudo install -m 0755 kubectl /usr/local/bin/kubectl

      - name: Export Vault environment through GitHub OIDC
        if: matrix.root == 'platform' && vars.AGENTGATE_VAULT_CONFIGURED == 'true'
        run: |
          aws eks update-kubeconfig \
            --name "${{ vars.AGENTGATE_CLUSTER_NAME || 'agentgate-sandbox-eks' }}" \
            --region "${{ vars.AGENTGATE_AWS_REGION }}"
          deploy/scripts/ci-vault-env.sh

      - name: Initialize root against the S3 backend
        run: deploy/scripts/init-root.sh "${{ matrix.root }}"

      - name: Detect drift
        run: |
          set +e
          terraform -chdir="deploy/${{ matrix.root }}" plan -input=false -detailed-exitcode
          exit_code="$?"
          set -e
          case "${exit_code}" in
            0) echo "No drift in deploy/${{ matrix.root }}." ;;
            2) echo "::error::Drift detected in deploy/${{ matrix.root }}; review the plan output." ; exit 1 ;;
            *) echo "::error::Drift plan for deploy/${{ matrix.root }} failed." ; exit 1 ;;
          esac
